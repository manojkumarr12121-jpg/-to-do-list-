<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 My Todo List</h1>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Enter a task..." />
      <select id="prioritySelect">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <button onclick="addTodo()">Add</button>
    </div>
    <div class="search-area">
  <input type="text" id="searchInput" placeholder="🔍 Search tasks..." oninput="renderTodos()" />
  </div>

    <!-- Filter Buttons -->
    <div class="filter-area">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('low', this)">🟢 Low</button>
      <button class="filter-btn" onclick="setFilter('medium', this)">🟡 Medium</button>
      <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">✅ Done</button>
    </div>
    <button class="clear-btn" onclick="clearCompleted()">🗑️ Clear Completed</button>
    <p class="task-counter" id="taskCounter"></p>

    <ul id="todoList"></ul>
    <p class="empty-msg" id="emptyMsg">No tasks yet. Add one above!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
